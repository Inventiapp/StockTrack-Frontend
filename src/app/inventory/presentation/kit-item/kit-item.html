<p>kit-item works!</p>

<div class="kit-item">
  <div class="info">
    <h4>{{ product.name }}</h4>
    <p>{{ product.description }}</p>
    <p><strong>Price:</strong> {{ product.unitPrice }}</p>
  </div>

  <div class="actions">
    <label for="qty">Qty:</label>
    <input
      id="qty"
      type="number"
      [value]="quantity"
      (input)="onQuantityChange($any($event.target).value)"
      min="1"
    />

    <button class="remove" (click)="onRemove()">❌ Remove</button>
  </div>
</div>

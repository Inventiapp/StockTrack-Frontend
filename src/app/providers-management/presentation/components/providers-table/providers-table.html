<section class="example-container mat-elevation-z8" tabindex="0">
  <table mat-table [dataSource]="dataSource" class="mat-table" matSort>

    <!-- name Column -->
    <ng-container matColumnDef="firstName">
      <th mat-header-cell *matHeaderCellDef> {{ 'providers-table.name' | translate }}</th>
      <td mat-cell *matCellDef="let provider"> {{ provider.firstName }} {{provider.lastName}}</td>
    </ng-container>

    <!-- phone Column -->
    <ng-container matColumnDef="phone">
      <th mat-header-cell *matHeaderCellDef> {{ 'providers-table.phone' | translate }}</th>
      <td mat-cell *matCellDef="let provider"> {{ provider.phoneNumber }}</td>
    </ng-container>

    <!-- email Column -->
    <ng-container matColumnDef="email">
      <th mat-header-cell *matHeaderCellDef> {{ 'providers-table.email' | translate }}</th>
      <td mat-cell *matCellDef="let provider"> {{ provider.email }}</td>
    </ng-container>

    <!-- ruc Column -->
    <ng-container matColumnDef="ruc">
      <th mat-header-cell *matHeaderCellDef> {{ 'providers-table.ruc' | translate }}</th>
      <td mat-cell *matCellDef="let provider"> {{ provider.ruc }}</td>
    </ng-container>


    <tr mat-header-row *matHeaderRowDef="displayedColumns; sticky: true"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
  </table>
</section>
